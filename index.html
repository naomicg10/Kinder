<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso privado ❤</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<canvas id="hearts-canvas"></canvas>

<div class="lock-screen">
  <div class="lock-icon" id="lock-icon">🔒</div>
  <p class="lock-title">Acceso privado</p>

  <div class="code-display" id="code-display">
    <div class="code-dot"></div>
    <div class="code-dot"></div>
    <div class="code-dot"></div>
    <div class="code-dot"></div>
  </div>

  <div class="keypad">
    <button class="key" onclick="press('1')">1</button>
    <button class="key" onclick="press('2')">2</button>
    <button class="key" onclick="press('3')">3</button>
    <button class="key" onclick="press('4')">4</button>
    <button class="key" onclick="press('5')">5</button>
    <button class="key" onclick="press('6')">6</button>
    <button class="key" onclick="press('7')">7</button>
    <button class="key" onclick="press('8')">8</button>
    <button class="key" onclick="press('9')">9</button>
    <button class="key del" onclick="del()">⌫</button>
    <button class="key zero" onclick="press('0')">0</button>
  </div>

  <p class="lock-msg" id="lock-msg"></p>
</div>

<script>
  const CODE    = '2808';
  let   entered = '';
  let   locked  = false;

  const dots    = document.querySelectorAll('.code-dot');
  const display = document.getElementById('code-display');
  const msg     = document.getElementById('lock-msg');
  const icon    = document.getElementById('lock-icon');

  function updateDots() {
    dots.forEach((d, i) => {
      d.classList.toggle('filled', i < entered.length);
      d.classList.remove('error');
    });
  }

  function showMsg(text) {
    msg.textContent = text;
    msg.classList.add('visible');
  }

  function press(digit) {
    if (locked || entered.length >= 4) return;
    entered += digit;
    updateDots();
    if (entered.length === 4) check();
  }

  function del() {
    if (locked) return;
    entered = entered.slice(0, -1);
    updateDots();
    msg.classList.remove('visible');
  }

  function check() {
    locked = true;
    if (entered === CODE) {
      // ── CORRECTO ──
      display.classList.add('success');
      icon.textContent  = '🔓';
      icon.classList.add('open');
      showMsg('¡Bienvenido, Tete! ❤');
      setTimeout(() => {
        window.location.href = 'main.html';
      }, 1400);
    } else {
      // ── INCORRECTO ──
      dots.forEach(d => d.classList.add('error'));
      showMsg('Código incorrecto 💔');
      setTimeout(() => {
        entered = '';
        locked  = false;
        updateDots();
        msg.classList.remove('visible');
      }, 900);
    }
  }

  // Soporte teclado físico
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') press(e.key);
    if (e.key === 'Backspace') del();
  });

  // ── CORAZONES FONDO ──
  const canvas = document.getElementById('hearts-canvas');
  const ctx    = canvas.getContext('2d');
  let hearts   = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function Heart() { this.reset(); }
  Heart.prototype.reset = function () {
    this.x         = Math.random() * canvas.width;
    this.y         = canvas.height + 20;
    this.size      = 8 + Math.random() * 14;
    this.speed     = .4 + Math.random() * .8;
    this.alpha     = .15 + Math.random() * .35;
    this.drift     = (Math.random() - .5) * .4;
    this.sway      = 0;
    this.swaySpeed = .01 + Math.random() * .02;
  };
  Heart.prototype.update = function () {
    this.sway += this.swaySpeed;
    this.x    += Math.sin(this.sway) * this.drift * 2;
    this.y    -= this.speed;
    if (this.y < -20) this.reset();
  };
  Heart.prototype.draw = function () {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle   = '#d966a0';
    ctx.translate(this.x, this.y);
    ctx.scale(this.size / 10, this.size / 10);
    ctx.beginPath();
    ctx.moveTo(0, -3);
    ctx.bezierCurveTo(-5, -8, -10, -3, 0,  4);
    ctx.bezierCurveTo( 10, -3,  5, -8, 0, -3);
    ctx.fill();
    ctx.restore();
  };

  for (let i = 0; i < 40; i++) {
    const h = new Heart();
    h.y = Math.random() * canvas.height;
    hearts.push(h);
  }

  (function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hearts.forEach(h => { h.update(); h.draw(); });
    requestAnimationFrame(loop);
  })();
</script>
</body>
</html>
